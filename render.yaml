services:
  - type: web
    name: sox-rag-prototype
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: 3000
      - key: DOCUMENTS_PATH
        value: /opt/render/project/data/documents
      - key: VECTOR_STORE_PATH
        value: /opt/render/project/data/vector_store.json
    disk:
      name: sox-rag-data
      mountPath: /opt/render/project/data
      sizeGB: 1
