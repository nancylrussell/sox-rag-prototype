services:
  - type: web
    name: sox-rag-prototype
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: 3000
    disk:
      name: sox-rag-data
      mountPath: /opt/render/project/src
      sizeGB: 1
